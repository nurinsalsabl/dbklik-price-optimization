<!DOCTYPE html>
<html>
<head>
    <title>DBKlik Price Optimization</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>DBKlik Price Optimization</h1>

        <div class="card">

            <h3>Pilih Produk</h3>

            <select id="productSelect">
                <option>Pilih Produk...</option>
            </select>

            <button onclick="loadProduct()">
                Tampilkan Produk
            </button>

        </div>

        <div class="card" id="productInfo">

            <h3>Informasi Produk</h3>

            <p>Nama: <span id="nama"></span></p>
            <p>Harga: <span id="harga"></span></p>
            <p>HPP: <span id="hpp"></span></p>
            <p>Qty: <span id="qty"></span></p>

        </div>

        <div class="card">

            <h3>Simulasi Harga</h3>

            <input
                type="number"
                id="newPrice"
                placeholder="Masukkan Harga Baru"
            >

            <button onclick="simulatePrice()">
                Simulasikan
            </button>

        </div>

        <div class="card">

            <h3>Hasil Simulasi</h3>

            <div id="simulateResult"></div>

        </div>

        <div class="card">

            <button onclick="optimizePrice()">
                Cari Harga Optimal
            </button>

        </div>

        <div class="card">

            <h3>Hasil Optimasi</h3>

            <div id="optimizeResult"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
